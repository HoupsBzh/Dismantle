<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dismantle — Bientôt disponible</title>
  <meta name="description" content="Tout le monde t'a dit que ton projet était bien. Et s'ils t'avaient tous menti ?" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: #060809;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'DM Mono', monospace;
      overflow: hidden;
    }

    .scan {
      position: fixed;
      inset: 0;
      background-image: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(255,255,255,0.011) 3px, rgba(255,255,255,0.011) 4px);
      pointer-events: none;
      z-index: 0;
    }
    .glow {
      position: fixed;
      top: 42%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 520px;
      height: 380px;
      background: radial-gradient(ellipse, rgba(140,180,255,0.04) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    .corner { position: fixed; width: 20px; height: 20px; z-index: 1; }
    .corner.tl { top: 1.5rem; left: 1.5rem; border-top: 1px solid #1e2a38; border-left: 1px solid #1e2a38; }
    .corner.tr { top: 1.5rem; right: 1.5rem; border-top: 1px solid #1e2a38; border-right: 1px solid #1e2a38; }
    .corner.bl { bottom: 1.5rem; left: 1.5rem; border-bottom: 1px solid #1e2a38; border-left: 1px solid #1e2a38; }
    .corner.br { bottom: 1.5rem; right: 1.5rem; border-bottom: 1px solid #1e2a38; border-right: 1px solid #1e2a38; }

    .privacy-link {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 9px;
      color: #1e2a38;
      letter-spacing: 0.2em;
      text-decoration: none;
      z-index: 2;
      transition: color 0.15s;
    }
    .privacy-link:hover { color: #3a5060; }

    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 680px;
    }

    .title-wrap { display: flex; gap: 2px; margin-bottom: 0; }
    .t-letter {
      font-family: 'Oswald', sans-serif;
      font-size: clamp(72px, 15vw, 118px);
      font-weight: 700;
      color: #e8edf2;
      line-height: 1;
      display: inline-block;
      opacity: 0;
      letter-spacing: 0.06em;
      text-shadow: 3px 4px 0px rgba(30,60,120,0.85), 5px 6px 0px rgba(15,35,80,0.4);
    }

    .bars { width: 100%; max-width: 440px; margin: 2.6rem auto 2.2rem; opacity: 0; }
    .bar1 { height: 2px; background: #1a2535; }
    .bar2 { height: 1px; background: #111820; margin-top: 3px; }

    .text-block { text-align: center; min-height: 64px; margin-bottom: 1.8rem; max-width: 440px; width: 100%; }
    .l1 { font-size: 14px; color: #3a5060; line-height: 2; letter-spacing: 0.04em; display: block; min-height: 28px; }
    .l2 { font-size: 15px; color: #8fa0b0; display: block; margin-top: 6px; letter-spacing: 0.04em; min-height: 24px; }

    .soon { font-size: 10px; color: #2a3a4a; letter-spacing: 0.3em; text-align: center; margin-bottom: 1.8rem; opacity: 0; }

    .form-wrap { display: flex; flex-direction: column; align-items: center; gap: 10px; width: 100%; max-width: 320px; opacity: 0; }
    .f-input {
      width: 100%;
      background: #0a0d10;
      border: 1px solid #1a2028;
      color: #e8edf2;
      padding: 11px 14px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      outline: none;
    }
    .f-input::placeholder { color: #1e2a38; }
    .f-input.error { border-color: #2a3a5a; }
    .f-btn {
      width: 100%;
      background: #e8edf2;
      color: #060809;
      border: 1px solid #e8edf2;
      padding: 11px 0;
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      font-size: 20px;
      letter-spacing: 0.12em;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .f-btn:hover { background: transparent; color: #e8edf2; }
    .f-btn:disabled { opacity: 0.5; cursor: default; }

    .f-msg {
      font-size: 10px;
      color: #2a3a4a;
      letter-spacing: 0.1em;
      text-align: center;
      min-height: 16px;
    }
    .f-msg.duplicate { color: #3a5060; }

    .confirm { text-align: center; opacity: 0; }
    .confirm-txt { font-size: 13px; color: #8fa0b0; letter-spacing: 0.08em; display: block; margin-bottom: 4px; }
    .confirm-sub { font-size: 10px; color: #2a3a4a; letter-spacing: 0.2em; }

    @keyframes flicker-in {
      0%   { opacity: 0; }
      6%   { opacity: 1; }
      10%  { opacity: 0; }
      16%  { opacity: 1; }
      20%  { opacity: 0; }
      27%  { opacity: 0.9; }
      32%  { opacity: 0; }
      42%  { opacity: 1; }
      46%  { opacity: 0.2; }
      54%  { opacity: 1; }
      100% { opacity: 1; }
    }
    @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fadeout { from { opacity: 1; } to { opacity: 0; } }
  </style>
</head>
<body>
  <div class="scan"></div>
  <div class="glow"></div>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <a href="/privacy" class="privacy-link">POLITIQUE DE CONFIDENTIALITÉ</a>

  <div class="content">
    <div class="title-wrap">
      <span class="t-letter">D</span>
      <span class="t-letter">I</span>
      <span class="t-letter">S</span>
      <span class="t-letter">M</span>
      <span class="t-letter">A</span>
      <span class="t-letter">N</span>
      <span class="t-letter">T</span>
      <span class="t-letter">L</span>
      <span class="t-letter">E</span>
    </div>

    <div class="bars" id="bars"></div>

    <div class="text-block">
      <span class="l1" id="l1"></span>
      <span class="l2" id="l2"></span>
    </div>

    <p class="soon" id="soon">— BIENTÔT DISPONIBLE —</p>

    <div class="form-wrap" id="form-wrap">
      <input class="f-input" type="email" id="email-input" placeholder="email@domaine.com" />
      <button class="f-btn" id="submit-btn">PRÊT(E)</button>
      <span class="f-msg" id="f-msg"></span>
    </div>

    <div class="confirm" id="confirm">
      <span class="confirm-txt">Noté. Tu seras prévenu(e).</span>
      <span class="confirm-sub">— DISMANTLE —</span>
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz8KHi--vdFZchafNQg8ePwIH8i0X_gZ8uix0KhfehaRHyIMbfyfk-vAJuLgoo7P3M/exec";
    const line1 = "Tout le monde t'a dit que ton projet était bien.";
    const line2 = "Et s'ils t'avaient tous menti ?";

    // Clé localStorage pour stocker les emails déjà soumis
    const STORAGE_KEY = 'dismantle_submitted';

    function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

    function fadeIn(el, duration) {
      return new Promise(r => {
        el.style.animation = 'fadein ' + duration + 'ms ease forwards';
        setTimeout(r, duration);
      });
    }

    function fadeOut(el, duration) {
      return new Promise(r => {
        el.style.animation = 'fadeout ' + duration + 'ms ease forwards';
        setTimeout(r, duration);
      });
    }

    function flickerLetter(el) {
      return new Promise(r => {
        el.style.animation = 'flicker-in 1.1s ease forwards';
        setTimeout(r, 1100);
      });
    }

    async function typeText(el, text, speed) {
      for (let i = 0; i < text.length; i++) {
        el.textContent += text[i];
        await wait(speed);
      }
    }

    function isAlreadySubmitted(email) {
      try {
        const stored = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        return stored.includes(email.toLowerCase());
      } catch(e) { return false; }
    }

    function markAsSubmitted(email) {
      try {
        const stored = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        stored.push(email.toLowerCase());
        localStorage.setItem(STORAGE_KEY, JSON.stringify(stored));
      } catch(e) {}
    }

    async function run() {
      await wait(400);
      const letters = document.querySelectorAll('.t-letter');
      for (let i = 0; i < letters.length; i++) {
        flickerLetter(letters[i]);
        await wait(140);
      }
      await wait(900);

      const bars = document.getElementById('bars');
      bars.innerHTML = '<div class="bar1"></div><div class="bar2"></div>';
      await fadeIn(bars, 250);
      await wait(200);

      await typeText(document.getElementById('l1'), line1, 34);
      await wait(250);
      await typeText(document.getElementById('l2'), line2, 40);
      await wait(350);

      await fadeIn(document.getElementById('soon'), 400);
      await wait(250);
      await fadeIn(document.getElementById('form-wrap'), 250);

      document.getElementById('submit-btn').addEventListener('click', async () => {
        const emailEl = document.getElementById('email-input');
        const msgEl = document.getElementById('f-msg');
        const email = emailEl.value.trim();

        // Validation format
        if (!email || !email.includes('@')) {
          emailEl.classList.add('error');
          msgEl.textContent = '';
          return;
        }
        emailEl.classList.remove('error');

        // Anti-doublon côté client
        if (isAlreadySubmitted(email)) {
          msgEl.classList.add('duplicate');
          msgEl.textContent = 'Cet email est déjà enregistré.';
          return;
        }

        const btn = document.getElementById('submit-btn');
        btn.disabled = true;
        btn.textContent = '...';
        msgEl.textContent = '';

        try {
          await fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: email })
          });
          markAsSubmitted(email);
        } catch(e) {}

        await fadeOut(document.getElementById('form-wrap'), 200);
        document.getElementById('form-wrap').style.display = 'none';
        await wait(100);
        await fadeIn(document.getElementById('confirm'), 400);
      });
    }

    run();
  </script>
</body>
</html>
